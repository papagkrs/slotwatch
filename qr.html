<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlotWatch – QR Codes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000; --surface: #0d0d0d; --surface2: #161616; --border: #2a2a2a;
    --accent: #ffd700; --accent2: #ff9500; --critical: #ff4444; --medium: #ff9500;
    --green: #00e676; --text: #ffffff; --muted: #888888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at top, #1a1a1a 0%, #000000 70%); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
  .logo-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
  .logo-text { font-size: 24px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }

  .content { padding: 24px 20px; max-width: 600px; margin: 0 auto; }

  .controls { background: linear-gradient(145deg, #111111, #0a0a0a); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .input-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 14px 16px; outline: none; transition: all 0.2s; }
  .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,215,0,0.1); }
  
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { flex: 1; padding: 14px 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; border: none; border-radius: 12px; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 15px rgba(255,215,0,0.3); transition: all 0.2s; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,0.4); }
  .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
  .btn-outline:hover { background: rgba(255,215,0,0.1); }
  .btn-small { padding: 10px 14px; font-size: 12px; }

  .add-row { display: flex; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .add-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 12px 14px; outline: none; }
  .add-row input:focus { border-color: var(--accent); }

  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, 160px); gap: 16px; }

  .qr-card { background: linear-gradient(145deg, #111111, #0a0a0a); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  .qr-card .qr-box { background: #fff; border-radius: 8px; padding: 8px; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
  .qr-card .qr-box img { width: 100%; height: 100%; object-fit: contain; }
  .qr-card .qr-name { font-weight: 700; font-size: 12px; line-height: 1.3; color: var(--text); }
  .qr-card .qr-actions { display: flex; gap: 6px; margin-top: 4px; }
  .qr-card .qr-btn { font-size: 10px; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; }
  .qr-card .qr-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 600px) {
    html, body { height: 100%; overflow: hidden; }
    .content { padding: 12px 12px 100px 12px; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    header { padding: 10px 12px; }
    .logo-text { font-size: 18px; }
    .logo-icon { width: 36px; height: 36px; font-size: 18px; }
    .controls { padding: 12px; margin-bottom: 12px; border-radius: 12px; }
    .input-group input { font-size: 13px; padding: 12px; border-radius: 8px; }
    .btn { padding: 12px 16px; font-size: 13px; border-radius: 10px; }
    .btn-row { gap: 8px; }
    .add-row input { font-size: 13px; padding: 10px; border-radius: 8px; }
    .section-title { font-size: 10px; margin-bottom: 12px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .qr-card { padding: 10px; border-radius: 10px; }
    .qr-card .qr-box { width: 90px; height: 90px; padding: 6px; }
    .qr-card .qr-name { font-size: 10px; }
  }

  @media print {
    body { background: #fff; color: #000; padding: 10px; }
    header, .controls, .add-row { display: none; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .qr-card { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 14px; break-inside: avoid; }
    .qr-card .qr-name { color: #000; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-icon">🎰</div>
    <div class="logo-text">SlotWatch QR-Codes</div>
  </header>

  <div class="content">
    <div class="controls">
      <div class="input-group">
        <label>Formular-URL:</label>
        <input type="text" id="baseUrl" value="https://papagkrs.github.io/slotwatch/">
      </div>
      <div class="btn-row">
        <button class="btn" onclick="generateAll()">⚡ Generieren</button>
        <button class="btn btn-outline" onclick="window.print()">🖨️ Drucken</button>
      </div>
      <div class="add-row">
        <input type="text" id="newStandort" placeholder="Neuer Standort...">
        <button class="btn btn-small" onclick="addStandort()">+</button>
      </div>
    </div>

    <div class="section-title">Standorte</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
let standorte = ['Feldmochinger Str. 8', 'Landsberger Str. 478', 'Stiftbogen 43', 'Stahlgruberring 40', 'Allacher Str. Karlsfeld', 'Bistro Tela 176', 'Casino Tela 176', 'Play Waltramstr. 1', 'Roj Reginfriedstr. 1', 'Auerfeld – Auerfeldstr. 27', 'Arena – Rosenheimer Str. 103', 'Max – Klackstr. 17 Unterschleißheim', 'Bo12 Perlach', 'Atlantis', 'Play – Schlierseer Str. 83'];

function loadFromStorage() {
  const saved = localStorage.getItem('slotwatch_standorte');
  if (saved) standorte = JSON.parse(saved);
  const savedUrl = localStorage.getItem('slotwatch_url');
  if (savedUrl) document.getElementById('baseUrl').value = savedUrl;
}

function saveSettings() {
  localStorage.setItem('slotwatch_standorte', JSON.stringify(standorte));
  localStorage.setItem('slotwatch_url', document.getElementById('baseUrl').value);
}

function addStandort() {
  const input = document.getElementById('newStandort');
  const name = input.value.trim();
  if (name && !standorte.includes(name)) {
    standorte.push(name);
    input.value = '';
    renderGrid();
    saveSettings();
  }
}

function removeStandort(idx) {
  standorte.splice(idx, 1);
  renderGrid();
  saveSettings();
}

function generateAll() {
  saveSettings();
  renderGrid();
}

function getQRUrl(url) {
  return 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(url);
}

function renderGrid() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const grid = document.getElementById('grid');
  grid.innerHTML = standorte.map((name, idx) => {
    const url = baseUrl + '?standort=' + encodeURIComponent(name);
    const qrUrl = getQRUrl(url);
    return '<div class="qr-card"><div class="qr-box"><img src="' + qrUrl + '" alt="QR"></div><div class="qr-name">📍 ' + name + '</div><div class="qr-actions"><button class="qr-btn" onclick="printSingle(' + idx + ')">🖨️</button><button class="qr-btn" onclick="removeStandort(' + idx + ')">🗑️</button></div></div>';
  }).join('');
}

function printSingle(idx) {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const name = standorte[idx];
  const url = baseUrl + '?standort=' + encodeURIComponent(name);
  const qrUrl = getQRUrl(url);
  const win = window.open('', '_blank');
  win.document.write('<html><head><title>QR - ' + name + '</title></head><body style="display:flex;justify-content:center;align-items:center;height:100vh;margin:0;"><img src="' + qrUrl + '" style="width:300px;height:300px;"></body></html>');
  win.document.close();
  win.onload = () => { win.print(); };
}

loadFromStorage();
renderGrid();
</script>
</body>
</html>
